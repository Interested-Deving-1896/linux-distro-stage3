name: Build Linux Distro Stage3

on:
  workflow_dispatch:
    inputs:
      distro:
        description: "Distro (leave blank for all tier-1)"
        required: false
        default: ""
      arch:
        description: "Arch (leave blank for all tier-1)"
        required: false
        default: ""
      release:
        description: "Release (leave blank for default)"
        required: false
        default: ""
      tier:
        description: "Max tier (1=stable, 2=+weekly, 3=all)"
        required: false
        default: "1"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "docs/**"
  schedule:
    # Tier-1 weekly — Monday 02:00 UTC
    - cron: "0 2 * * 1"
    # Tier-2 weekly — Wednesday 02:00 UTC
    - cron: "0 2 * * 3"

concurrency:
  group: stage3-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ── Generate matrix ─────────────────────────────────────────────────────────
  matrix:
    name: Generate build matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      tier:   ${{ steps.tier.outputs.tier }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tier
        id: tier
        run: |
          # Wednesday schedule → tier 2; everything else → tier 1
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            day=$(date +%u)   # 1=Mon … 7=Sun
            echo "tier=$([[ $day -eq 3 ]] && echo 2 || echo 1)" >> "$GITHUB_OUTPUT"
          else
            echo "tier=${{ github.event.inputs.tier || '1' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install PyYAML
        run: pip3 install --quiet pyyaml

      - name: Generate matrix
        id: gen
        env:
          INPUT_DISTRO:  ${{ github.event.inputs.distro  || '' }}
          INPUT_ARCH:    ${{ github.event.inputs.arch    || '' }}
          INPUT_RELEASE: ${{ github.event.inputs.release || '' }}
          INPUT_TIER:    ${{ steps.tier.outputs.tier }}
        run: |
          python3 scripts/gen-matrix.py \
            --distro  "${INPUT_DISTRO}"  \
            --arch    "${INPUT_ARCH}"    \
            --release "${INPUT_RELEASE}" \
            --tier    "${INPUT_TIER}"    \
            | tee /tmp/matrix.json
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: "${{ matrix.distro }}/${{ matrix.release }}/${{ matrix.arch }}"
    needs: matrix
    runs-on: ubuntu-24.04
    if: ${{ needs.matrix.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            qemu-user-static \
            binfmt-support \
            curl git \
            xz-utils zstd \
            python3-yaml

      - name: Register QEMU binfmt handlers
        run: sudo update-binfmts --enable

      - name: Show disk space
        run: df -h

      - name: Build stage3
        env:
          DISTRO:  ${{ matrix.distro }}
          RELEASE: ${{ matrix.release }}
          ARCH:    ${{ matrix.arch }}
          JOBS:    "2"
        run: |
          sudo -E ./build.sh \
            --distro  "$DISTRO"  \
            --release "$RELEASE" \
            --arch    "$ARCH"    \
            --jobs    "$JOBS"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.distro }}-stage3-${{ matrix.release }}-${{ matrix.arch }}"
          path: |
            ${{ matrix.distro }}_stage3_${{ matrix.release }}_${{ matrix.arch }}_*.tar.gz
            ${{ matrix.distro }}_stage3_${{ matrix.release }}_${{ matrix.arch }}_*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    name: Create release
    needs: [matrix, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    # Only release on push to main or scheduled runs
    if: >-
      always() &&
      needs.build.result != 'cancelled' &&
      (github.event_name == 'push' || github.event_name == 'schedule')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -name "*.tar.gz" | sort

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*.tar.gz,artifacts/*.sha256"
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          tag: "stage3-${{ github.run_id }}"
          name: "Linux Distro Stage3 — tier ${{ needs.matrix.outputs.tier }} — ${{ github.run_id }}"
          body: |
            Automated stage3 tarballs — tier ${{ needs.matrix.outputs.tier }} build.

            Each tarball is a minimal bootable root filesystem containing:
            - Compiler toolchain (gcc, g++, binutils, make, cmake, ninja)
            - Languages (python3, go)
            - Build tools (autoconf, automake, bison, flex, patch)
            - Kernel image + headers (arch-specific)
            - initramfs tools + squashfs/xorriso for ISO assembly
            - Essential utils (git, curl, sudo, util-linux, xz, zstd)

            **Verify integrity:**
            ```
            sha256sum -c {distro}_stage3_{release}_{arch}_{date}.tar.gz.sha256
            ```
          allowUpdates: true
          removeArtifacts: false
